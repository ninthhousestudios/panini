<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pāṇini</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #faf8f5;
  --surface: #fff;
  --border: #d4c8b8;
  --text: #2c2416;
  --text-secondary: #6b5d4d;
  --accent: #8b4513;
  --accent-light: #f5ebe0;
  --error-bg: #fef2f2;
  --error-text: #991b1b;
  --trace-bg: #f9f6f2;
  --mono: "Menlo", "Consolas", "DejaVu Sans Mono", monospace;
  --sans: system-ui, -apple-system, sans-serif;
  --devanagari: "Noto Sans Devanagari", "Devanagari MT", sans-serif;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}

.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

h1 {
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 0;
}

h1 span { font-weight: 400; color: var(--text-secondary); }

/* --- Tabs --- */
.tab-bar {
  display: flex;
  gap: 0;
  border-bottom: 2px solid var(--border);
  margin: 1rem 0 1.5rem;
}

.tab-bar button {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  padding: 0.5rem 1.25rem;
  font-family: var(--sans);
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}

.tab-bar button:hover { color: var(--text); }
.tab-bar button.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.tab-view { display: none; }
.tab-view.active { display: block; }

/* --- Shared form styles --- */
.input-bar {
  display: flex;
  gap: 0.75rem;
  align-items: end;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}

.field { display: flex; flex-direction: column; gap: 0.25rem; }
.field label {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-secondary);
}

.field input, .field select {
  font-family: var(--mono);
  font-size: 0.9rem;
  padding: 0.5rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  color: var(--text);
}

.field input:focus, .field select:focus {
  outline: 2px solid var(--accent);
  outline-offset: -1px;
}

.field-grow { flex: 1; min-width: 140px; }
.field-grow input { width: 100%; }

.btn {
  font-family: var(--sans);
  font-size: 0.9rem;
  font-weight: 600;
  padding: 0.5rem 1.25rem;
  border: none;
  border-radius: 4px;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  white-space: nowrap;
}

.btn:hover { opacity: 0.9; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.status {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-bottom: 1rem;
  min-height: 1.3em;
}

.status.error { color: var(--error-text); }

/* --- Tables --- */
table {
  width: 100%;
  border-collapse: collapse;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}

thead th {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-secondary);
  background: var(--accent-light);
  padding: 0.5rem 0.75rem;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

thead th:first-child { text-align: left; }

tbody td {
  padding: 0.5rem 0.75rem;
  text-align: center;
  border-bottom: 1px solid #eee;
  vertical-align: top;
  transition: background 0.15s;
}

tbody tr:last-child td { border-bottom: none; }

/* --- Paradigm grid --- */
.paradigm-grid tbody td { cursor: pointer; }
.paradigm-grid tbody td:first-child {
  text-align: left;
  font-weight: 600;
  font-size: 0.8rem;
  color: var(--text-secondary);
  cursor: default;
  background: var(--accent-light);
  white-space: nowrap;
}
.paradigm-grid tbody td:hover:not(:first-child) { background: var(--accent-light); }

.cell-deva {
  font-family: var(--devanagari);
  font-size: 1.1rem;
  line-height: 1.3;
  display: block;
}

.cell-iast {
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--text-secondary);
  display: block;
}

.cell-error {
  font-size: 0.75rem;
  color: var(--error-text);
  background: var(--error-bg);
  padding: 0.2rem 0.4rem;
  border-radius: 2px;
}

/* --- Trace panel (shared) --- */
.trace-panel {
  margin-top: 1rem;
  background: var(--trace-bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1rem;
  display: none;
}

.trace-panel.open { display: block; }

.trace-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.75rem;
}

.trace-header h3 { font-size: 0.9rem; font-weight: 600; }

.trace-close {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 1.2rem;
  padding: 0;
  line-height: 1;
}

.trace-close:hover { color: var(--text); }

.trace-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
  background: var(--surface);
}

.trace-table th {
  text-align: left;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-secondary);
  padding: 0.4rem 0.5rem;
  border-bottom: 1px solid var(--border);
}

.trace-table td {
  padding: 0.4rem 0.5rem;
  border-bottom: 1px solid #eee;
  font-family: var(--mono);
  font-size: 0.8rem;
  cursor: default;
  text-align: left;
}

.trace-table td:first-child { color: var(--text-secondary); text-align: center; }

.trace-rule-ref { font-weight: 600; color: var(--accent); }

/* --- Sandhi result card --- */
.sandhi-result {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1rem 1.25rem;
  margin-bottom: 1rem;
}

.sandhi-form {
  font-family: var(--devanagari);
  font-size: 1.4rem;
  display: block;
  margin-bottom: 0.25rem;
}

.sandhi-iast {
  font-family: var(--mono);
  font-size: 0.9rem;
  color: var(--text-secondary);
  display: block;
  margin-bottom: 0.75rem;
}

/* --- Sandhi candidates list --- */
.candidate-list { list-style: none; }

.candidate {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.75rem 1rem;
  margin-bottom: 0.5rem;
}

.candidate-forms {
  font-family: var(--mono);
  font-size: 0.9rem;
  margin-bottom: 0.25rem;
}

.candidate-deva {
  font-family: var(--devanagari);
  font-size: 1.05rem;
}

.candidate-rule {
  font-size: 0.8rem;
  color: var(--text-secondary);
}

.candidate-ref { font-weight: 600; color: var(--accent); }

/* --- Sandhi mode toggle --- */
.mode-toggle {
  display: flex;
  gap: 0;
  margin-bottom: 1rem;
}

.mode-toggle button {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 0.4rem 1rem;
  font-family: var(--sans);
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
}

.mode-toggle button:first-child { border-radius: 4px 0 0 4px; }
.mode-toggle button:last-child { border-radius: 0 4px 4px 0; border-left: none; }
.mode-toggle button.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* --- Sūtra browser --- */
.sutra-search {
  margin-bottom: 1rem;
}

.sutra-search input {
  font-family: var(--mono);
  font-size: 0.9rem;
  padding: 0.5rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  color: var(--text);
  width: 100%;
  max-width: 400px;
}

.sutra-search input:focus {
  outline: 2px solid var(--accent);
  outline-offset: -1px;
}

.sutra-list { list-style: none; }

.sutra-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.6rem 1rem;
  margin-bottom: 0.4rem;
  display: flex;
  align-items: baseline;
  gap: 0.75rem;
}

.sutra-num {
  font-family: var(--mono);
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
  min-width: 5em;
}

.sutra-text {
  flex: 1;
  font-size: 0.9rem;
}

.sutra-tags {
  display: flex;
  gap: 0.3rem;
  flex-shrink: 0;
}

.sutra-tag {
  font-size: 0.7rem;
  font-weight: 600;
  padding: 0.1rem 0.4rem;
  border-radius: 3px;
  background: var(--accent-light);
  color: var(--accent);
  white-space: nowrap;
}

.sutra-count {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-bottom: 0.75rem;
}

/* --- Verification tab --- */
.verify-intro {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-bottom: 1.5rem;
  line-height: 1.6;
}

.check-report {
  margin-bottom: 2rem;
}

.check-report h2 {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 0.75rem;
}

.verdict-box {
  padding: 1rem 1.25rem;
  border-radius: 6px;
  margin-bottom: 1.25rem;
  font-size: 0.9rem;
  line-height: 1.5;
}

.verdict-clean {
  background: #f0fdf4;
  border: 1px solid #86efac;
  color: #166534;
}

.verdict-issues {
  background: var(--error-bg);
  border: 1px solid #fca5a5;
  color: var(--error-text);
}

.check-section {
  margin-bottom: 1.25rem;
}

.check-section h3 {
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
  color: var(--text);
}

.check-section .empty-note {
  font-size: 0.85rem;
  color: var(--text-secondary);
  font-style: italic;
}

.issue-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.6rem 1rem;
  margin-bottom: 0.4rem;
  font-size: 0.85rem;
}

.issue-card .pattern {
  font-family: var(--mono);
  font-weight: 600;
  color: var(--accent);
}

.issue-card .detail {
  color: var(--text-secondary);
  margin-top: 0.2rem;
}

.coverage-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 0.75rem;
  margin-bottom: 1rem;
}

.coverage-stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.75rem 1rem;
  text-align: center;
}

.coverage-stat .stat-value {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--accent);
  display: block;
}

.coverage-stat .stat-label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-secondary);
}

.sutra-breakdown {
  columns: 2;
  column-gap: 1rem;
  list-style: none;
}

.sutra-breakdown li {
  font-size: 0.85rem;
  padding: 0.15rem 0;
  break-inside: avoid;
}

.sutra-breakdown .sb-num {
  font-family: var(--mono);
  font-weight: 600;
  color: var(--accent);
  min-width: 5em;
  display: inline-block;
}

.sutra-breakdown .sb-count {
  color: var(--text-secondary);
}

.type-breakdown {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-bottom: 0.75rem;
}

.type-badge {
  font-size: 0.8rem;
  font-weight: 600;
  padding: 0.25rem 0.6rem;
  border-radius: 3px;
  background: var(--accent-light);
  color: var(--accent);
}

@media (max-width: 600px) {
  .input-bar { flex-direction: column; align-items: stretch; }
  .container { padding: 1rem; }
  table { font-size: 0.85rem; }
  .sutra-item { flex-wrap: wrap; }
}
</style>
</head>
<body>
<div class="container">
  <h1>Pāṇini</h1>

  <div class="tab-bar">
    <button class="active" data-tab="paradigm">Paradigms</button>
    <button data-tab="sandhi">Sandhi</button>
    <button data-tab="sutras">Sūtras</button>
    <button data-tab="verify">Verification</button>
  </div>

  <!-- ============ PARADIGM TAB ============ -->
  <div id="tab-paradigm" class="tab-view active">
    <div class="input-bar">
      <div class="field field-grow">
        <label for="p-stem">Stem (IAST)</label>
        <input id="p-stem" type="text" placeholder="deva" autocomplete="off" spellcheck="false">
      </div>
      <div class="field">
        <label for="p-stem-type">Stem type</label>
        <input id="p-stem-type" type="text" list="stem-types" value="a-stem-m" placeholder="a-stem-m" autocomplete="off">
        <datalist id="stem-types">
          <option value="a-stem-m">a-stem masc</option>
          <option value="a-stem-n">a-stem neut</option>
          <option value="aa-stem-f">ā-stem fem</option>
          <option value="i-stem-m">i-stem masc</option>
          <option value="u-stem-m">u-stem masc</option>
        </datalist>
      </div>
      <button class="btn" id="p-go" type="button">Generate</button>
    </div>
    <div id="p-status" class="status"></div>
    <div id="p-grid"></div>
    <div id="p-trace" class="trace-panel">
      <div class="trace-header">
        <h3 id="p-trace-title"></h3>
        <button class="trace-close" data-close="p-trace">&times;</button>
      </div>
      <div id="p-trace-body"></div>
    </div>
  </div>

  <!-- ============ SANDHI TAB ============ -->
  <div id="tab-sandhi" class="tab-view">
    <div class="mode-toggle">
      <button class="active" data-mode="forward">Forward (join)</button>
      <button data-mode="reverse">Reverse (split)</button>
    </div>

    <div id="sandhi-forward">
      <div class="input-bar">
        <div class="field field-grow">
          <label for="s-first">First word (IAST)</label>
          <input id="s-first" type="text" placeholder="deva" autocomplete="off" spellcheck="false">
        </div>
        <div class="field field-grow">
          <label for="s-second">Second word (IAST)</label>
          <input id="s-second" type="text" placeholder="atra" autocomplete="off" spellcheck="false">
        </div>
        <button class="btn" id="s-fwd-go" type="button">Join</button>
      </div>
    </div>

    <div id="sandhi-reverse" style="display:none">
      <div class="input-bar">
        <div class="field field-grow">
          <label for="s-form">Combined form (IAST)</label>
          <input id="s-form" type="text" placeholder="devāḥ" autocomplete="off" spellcheck="false">
        </div>
        <button class="btn" id="s-rev-go" type="button">Analyze</button>
      </div>
    </div>

    <div id="s-status" class="status"></div>
    <div id="s-result"></div>
    <div id="s-trace" class="trace-panel">
      <div class="trace-header">
        <h3 id="s-trace-title"></h3>
        <button class="trace-close" data-close="s-trace">&times;</button>
      </div>
      <div id="s-trace-body"></div>
    </div>
  </div>

  <!-- ============ SŪTRA TAB ============ -->
  <div id="tab-sutras" class="tab-view">
    <div class="sutra-search">
      <input id="sutra-q" type="text" placeholder="Search sūtras by number or text…" autocomplete="off" spellcheck="false">
    </div>
    <div id="sutra-count" class="sutra-count"></div>
    <ul id="sutra-list" class="sutra-list"></ul>
  </div>

  <!-- ============ VERIFICATION TAB ============ -->
  <div id="tab-verify" class="tab-view">
    <p class="verify-intro">Automated consistency checks against the loaded rule set. These verify that the implementation is internally coherent: no shadowed rules, no ambiguous overlaps, and full coverage reporting.</p>
    <div id="v-status" class="status"></div>
    <div id="v-reports"></div>
  </div>
</div>

<script>
"use strict";

// ============ TRANSLITERATION ============

const IAST_TO_DEVA = [
  ["ai","ऐ"],["au","औ"],
  ["kh","ख"],["gh","घ"],["ch","छ"],["jh","झ"],
  ["ṭh","ठ"],["ḍh","ढ"],["th","थ"],["dh","ध"],["ph","फ"],["bh","भ"],
  ["ṅ","ङ"],["ñ","ञ"],["ṇ","ण"],["ṃ","ं"],["ḥ","ः"],
  ["ā","आ"],["ī","ई"],["ū","ऊ"],["ṝ","ॠ"],["ṛ","ऋ"],["ḷ","ऌ"],
  ["a","अ"],["i","इ"],["u","उ"],["e","ए"],["o","ओ"],
  ["k","क"],["g","ग"],["ṅ","ङ"],["c","च"],["j","ज"],
  ["ṭ","ट"],["ḍ","ड"],["ṇ","ण"],["t","त"],["d","द"],["n","न"],
  ["p","प"],["b","ब"],["m","म"],
  ["y","य"],["r","र"],["l","ल"],["v","व"],
  ["ś","श"],["ṣ","ष"],["s","स"],["h","ह"],
];

const VOWEL_SIGNS = {
  "आ":"ा","इ":"ि","ई":"ी","उ":"ु","ऊ":"ू",
  "ऋ":"ृ","ॠ":"ॄ","ऌ":"ॢ","ए":"े","ऐ":"ै","ओ":"ो","औ":"ौ",
};

const INDEPENDENT_VOWELS = new Set([
  "अ","आ","इ","ई","उ","ऊ","ऋ","ॠ","ऌ","ए","ऐ","ओ","औ"
]);

const CONSONANTS = new Set([
  "क","ख","ग","घ","ङ","च","छ","ज","झ","ञ",
  "ट","ठ","ड","ढ","ण","त","थ","द","ध","न",
  "प","फ","ब","भ","म","य","र","ल","व","श","ष","स","ह"
]);

function iastToDeva(iast) {
  if (!iast) return "";
  let tokens = [];
  let s = iast.toLowerCase();
  while (s.length > 0) {
    let found = false;
    for (const [lat, dev] of IAST_TO_DEVA) {
      if (s.startsWith(lat)) {
        tokens.push(dev);
        s = s.slice(lat.length);
        found = true;
        break;
      }
    }
    if (!found) {
      tokens.push(s[0]);
      s = s.slice(1);
    }
  }
  let result = "";
  for (let i = 0; i < tokens.length; i++) {
    const tok = tokens[i];
    if (CONSONANTS.has(tok)) {
      const next = tokens[i + 1];
      if (next && INDEPENDENT_VOWELS.has(next)) {
        result += next === "अ" ? tok : tok + (VOWEL_SIGNS[next] || "");
        i++;
      } else {
        result += tok + "्";
      }
    } else {
      result += tok;
    }
  }
  return result;
}

function esc(s) {
  if (!s) return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function dual(iast) {
  const deva = iastToDeva(iast);
  return `<span class="cell-deva">${esc(deva)}</span><span class="cell-iast">${esc(iast)}</span>`;
}

// ============ TABS ============

document.querySelector(".tab-bar").addEventListener("click", e => {
  const btn = e.target.closest("[data-tab]");
  if (!btn) return;
  document.querySelectorAll(".tab-bar button").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab-view").forEach(v => v.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
  if (btn.dataset.tab === "sutras" && !sutrasLoaded) loadSutras();
  if (btn.dataset.tab === "verify" && !verifyLoaded) loadVerification();
});

document.querySelectorAll("[data-close]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.getElementById(btn.dataset.close).classList.remove("open");
  });
});

// ============ TRACE RENDERING (shared) ============

function renderTrace(panelId, titleId, bodyId, title, trace) {
  document.getElementById(titleId).textContent = title;
  let html = `<table class="trace-table"><thead><tr>` +
    `<th>#</th><th>Rule</th><th>Input</th><th>Output</th>` +
    `</tr></thead><tbody>`;
  for (const step of trace) {
    const ref = step.rule_ref
      ? `<span class="trace-rule-ref">${esc(step.rule_ref)}</span> `
      : "";
    html += `<tr><td>${step.step}</td><td>${ref}${esc(step.rule)}</td>` +
      `<td>${esc(step.input_state)}</td><td>${esc(step.output_state)}</td></tr>`;
  }
  html += "</tbody></table>";
  document.getElementById(bodyId).innerHTML = html;
  const panel = document.getElementById(panelId);
  panel.classList.add("open");
  panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

// ============ PARADIGM TAB ============

const CASE_LABELS = {
  "1": "prathamā (nom.)", "2": "dvitīyā (acc.)", "3": "tṛtīyā (ins.)",
  "4": "caturthī (dat.)", "5": "pañcamī (abl.)", "6": "ṣaṣṭhī (gen.)",
  "7": "saptamī (loc.)", "8": "sambodhana (voc.)",
};
const NUMBER_LABELS = { "sg": "ekavacana", "du": "dvivacana", "pl": "bahuvacana" };

let paradigmCells = null;

document.getElementById("p-go").addEventListener("click", generateParadigm);
document.getElementById("p-stem").addEventListener("keydown", e => {
  if (e.key === "Enter") generateParadigm();
});

async function generateParadigm() {
  const stem = document.getElementById("p-stem").value.trim();
  const stemType = document.getElementById("p-stem-type").value.trim();
  const status = document.getElementById("p-status");
  const grid = document.getElementById("p-grid");

  if (!stem) { status.textContent = "Enter a stem."; status.className = "status error"; return; }

  status.textContent = "Generating…";
  status.className = "status";
  document.getElementById("p-trace").classList.remove("open");
  document.getElementById("p-go").disabled = true;

  try {
    const resp = await fetch("/api/paradigm", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ domain: "vyakarana", stem, stem_type: stemType }),
    });
    if (!resp.ok) throw new Error(await resp.text() || resp.statusText);

    const data = await resp.json();
    paradigmCells = data.cells;

    const cellMap = {};
    for (const c of data.cells) cellMap[c.case + ":" + c.number] = c;

    const cases = ["1","2","3","4","5","6","7","8"];
    const numbers = ["sg","du","pl"];

    let html = `<table class="paradigm-grid"><thead><tr><th></th>`;
    for (const n of numbers) html += `<th>${NUMBER_LABELS[n]}</th>`;
    html += "</tr></thead><tbody>";
    for (const cas of cases) {
      html += `<tr><td>${CASE_LABELS[cas]}</td>`;
      for (const num of numbers) {
        const cell = cellMap[cas + ":" + num];
        if (!cell) {
          html += "<td>—</td>";
        } else if (cell.error) {
          html += `<td><span class="cell-error" title="${esc(cell.error)}">error</span></td>`;
        } else {
          html += `<td data-case="${cas}" data-number="${num}">${dual(cell.form)}</td>`;
        }
      }
      html += "</tr>";
    }
    html += "</tbody></table>";
    grid.innerHTML = html;

    grid.querySelectorAll("td[data-case]").forEach(td => {
      td.addEventListener("click", () => {
        const cell = paradigmCells.find(c => c.case === td.dataset.case && c.number === td.dataset.number);
        if (cell && cell.trace && cell.trace.length > 0) {
          renderTrace("p-trace", "p-trace-title", "p-trace-body",
            `${CASE_LABELS[td.dataset.case]} ${NUMBER_LABELS[td.dataset.number]} — ${cell.form}`,
            cell.trace);
        }
      });
    });

    status.textContent = `${data.stem} (${data.stem_type})`;
    status.className = "status";
  } catch (e) {
    status.textContent = e.message;
    status.className = "status error";
    grid.innerHTML = "";
  } finally {
    document.getElementById("p-go").disabled = false;
  }
}

// ============ SANDHI TAB ============

const modeToggle = document.querySelector(".mode-toggle");
modeToggle.addEventListener("click", e => {
  const btn = e.target.closest("[data-mode]");
  if (!btn) return;
  modeToggle.querySelectorAll("button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("sandhi-forward").style.display = btn.dataset.mode === "forward" ? "" : "none";
  document.getElementById("sandhi-reverse").style.display = btn.dataset.mode === "reverse" ? "" : "none";
  document.getElementById("s-status").textContent = "";
  document.getElementById("s-result").innerHTML = "";
  document.getElementById("s-trace").classList.remove("open");
});

document.getElementById("s-fwd-go").addEventListener("click", sandhiForward);
document.getElementById("s-rev-go").addEventListener("click", sandhiReverse);
document.getElementById("s-first").addEventListener("keydown", e => { if (e.key === "Enter") sandhiForward(); });
document.getElementById("s-second").addEventListener("keydown", e => { if (e.key === "Enter") sandhiForward(); });
document.getElementById("s-form").addEventListener("keydown", e => { if (e.key === "Enter") sandhiReverse(); });

async function sandhiForward() {
  const first = document.getElementById("s-first").value.trim();
  const second = document.getElementById("s-second").value.trim();
  const status = document.getElementById("s-status");
  const result = document.getElementById("s-result");

  if (!first || !second) { status.textContent = "Enter both words."; status.className = "status error"; return; }

  status.textContent = "Joining…";
  status.className = "status";
  result.innerHTML = "";
  document.getElementById("s-trace").classList.remove("open");
  document.getElementById("s-fwd-go").disabled = true;

  try {
    const resp = await fetch("/api/derive", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ domain: "vyakarana", operation: "sandhi", input: { first, second } }),
    });
    if (!resp.ok) throw new Error(await resp.text() || resp.statusText);

    const data = await resp.json();
    const form = data.result.form || data.result;
    const deva = iastToDeva(typeof form === "string" ? form : JSON.stringify(form));
    const iast = typeof form === "string" ? form : JSON.stringify(form);

    let html = `<div class="sandhi-result">`;
    html += `<span class="sandhi-form">${esc(deva)}</span>`;
    html += `<span class="sandhi-iast">${esc(iast)}</span>`;
    if (data.trace && data.trace.length > 0) {
      html += `<button class="btn" id="s-fwd-trace-btn" type="button" style="font-size:0.8rem;padding:0.3rem 0.75rem">Show trace</button>`;
    }
    html += `</div>`;
    result.innerHTML = html;

    if (data.trace && data.trace.length > 0) {
      document.getElementById("s-fwd-trace-btn").addEventListener("click", () => {
        renderTrace("s-trace", "s-trace-title", "s-trace-body",
          `${first} + ${second} → ${iast}`, data.trace);
      });
    }

    status.textContent = `${first} + ${second}`;
    status.className = "status";
  } catch (e) {
    status.textContent = e.message;
    status.className = "status error";
  } finally {
    document.getElementById("s-fwd-go").disabled = false;
  }
}

async function sandhiReverse() {
  const form = document.getElementById("s-form").value.trim();
  const status = document.getElementById("s-status");
  const result = document.getElementById("s-result");

  if (!form) { status.textContent = "Enter a combined form."; status.className = "status error"; return; }

  status.textContent = "Analyzing…";
  status.className = "status";
  result.innerHTML = "";
  document.getElementById("s-trace").classList.remove("open");
  document.getElementById("s-rev-go").disabled = true;

  try {
    const resp = await fetch("/api/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ domain: "vyakarana", operation: "sandhi", form }),
    });
    if (!resp.ok) throw new Error(await resp.text() || resp.statusText);

    const data = await resp.json();
    const candidates = data.candidates || [];

    if (candidates.length === 0) {
      result.innerHTML = `<p style="color:var(--text-secondary)">No decompositions found.</p>`;
      status.textContent = form;
      status.className = "status";
      return;
    }

    let html = `<ul class="candidate-list">`;
    for (const c of candidates) {
      const firstDeva = iastToDeva(c.first);
      const secondDeva = iastToDeva(c.second);
      const ref = c.rule_ref ? `<span class="candidate-ref">${esc(c.rule_ref)}</span> ` : "";
      html += `<li class="candidate">` +
        `<div class="candidate-deva">${esc(firstDeva)} + ${esc(secondDeva)}</div>` +
        `<div class="candidate-forms">${esc(c.first)} + ${esc(c.second)}</div>` +
        `<div class="candidate-rule">${ref}${esc(c.rule)}</div>` +
        `</li>`;
    }
    html += `</ul>`;
    result.innerHTML = html;

    status.textContent = `${form} — ${candidates.length} candidate${candidates.length !== 1 ? "s" : ""}`;
    status.className = "status";
  } catch (e) {
    status.textContent = e.message;
    status.className = "status error";
  } finally {
    document.getElementById("s-rev-go").disabled = false;
  }
}

// ============ SŪTRA TAB ============

let sutrasLoaded = false;
let allSutras = [];

async function loadSutras() {
  const count = document.getElementById("sutra-count");
  const list = document.getElementById("sutra-list");
  count.textContent = "Loading…";

  try {
    const resp = await fetch("/api/sutras");
    if (!resp.ok) throw new Error(await resp.text() || resp.statusText);
    allSutras = await resp.json();
    sutrasLoaded = true;
    renderSutras(allSutras);
  } catch (e) {
    count.textContent = e.message;
    count.className = "sutra-count error";
  }
}

function renderSutras(sutras) {
  const count = document.getElementById("sutra-count");
  const list = document.getElementById("sutra-list");

  count.textContent = `${sutras.length} sūtra${sutras.length !== 1 ? "s" : ""}`;
  count.className = "sutra-count";

  let html = "";
  for (const s of sutras) {
    const tags = s.templates.map(t => `<span class="sutra-tag">${esc(t)}</span>`).join("");
    html += `<li class="sutra-item">` +
      `<span class="sutra-num">${esc(s.sutra)}</span>` +
      `<span class="sutra-text">${esc(s.statement)}</span>` +
      `<span class="sutra-tags">${tags}</span>` +
      `</li>`;
  }
  list.innerHTML = html;
}

document.getElementById("sutra-q").addEventListener("input", e => {
  const q = e.target.value.trim().toLowerCase();
  if (!q) { renderSutras(allSutras); return; }
  const filtered = allSutras.filter(s =>
    s.sutra.toLowerCase().includes(q) ||
    s.statement.toLowerCase().includes(q) ||
    s.templates.some(t => t.toLowerCase().includes(q))
  );
  renderSutras(filtered);
});

// ============ VERIFICATION TAB ============

let verifyLoaded = false;

async function loadVerification() {
  const status = document.getElementById("v-status");
  const reports = document.getElementById("v-reports");
  status.textContent = "Running consistency checks…";
  status.className = "status";

  try {
    const resp = await fetch("/api/check");
    if (!resp.ok) throw new Error(await resp.text() || resp.statusText);
    const data = await resp.json();
    verifyLoaded = true;
    status.textContent = "";
    renderVerification(data);
  } catch (e) {
    status.textContent = e.message;
    status.className = "status error";
  }
}

function renderVerification(data) {
  const container = document.getElementById("v-reports");
  let html = "";

  for (const report of data) {
    html += `<div class="check-report">`;
    html += `<h2>${esc(report.template)} (${report.total_rules} rules)</h2>`;

    const s = report.summary;
    const cls = s.clean ? "verdict-clean" : "verdict-issues";
    html += `<div class="verdict-box ${cls}">${esc(s.verdict)}</div>`;

    // Coverage stats
    html += `<div class="check-section"><h3>Coverage</h3>`;
    html += `<div class="coverage-grid">`;
    const cov = report.coverage;
    html += renderStat(cov.covered_combinations, cov.covered_combinations_label);
    html += renderStat(Object.keys(cov.rules_by_sutra).length, "distinct sūtras");
    for (const dim of cov.dimensions) {
      html += renderStat(dim.values.length, dim.label);
    }
    html += `</div>`;

    // Type breakdown
    const types = report.coverage.rules_by_type;
    if (Object.keys(types).length > 0) {
      html += `<div class="type-breakdown">`;
      for (const [type, count] of Object.entries(types)) {
        html += `<span class="type-badge">${esc(type)}: ${count}</span>`;
      }
      html += `</div>`;
    }

    // Sutra breakdown
    const sutras = report.coverage.rules_by_sutra;
    const sutraKeys = Object.keys(sutras).sort();
    if (sutraKeys.length > 0) {
      html += `<ul class="sutra-breakdown">`;
      for (const k of sutraKeys) {
        html += `<li><span class="sb-num">${esc(k)}</span> <span class="sb-count">${sutras[k]} rule${sutras[k] !== 1 ? "s" : ""}</span></li>`;
      }
      html += `</ul>`;
    }
    html += `</div>`;

    // Parse errors
    html += `<div class="check-section"><h3>Parse Errors</h3>`;
    if (report.parse_errors.length === 0) {
      html += `<div class="empty-note">None</div>`;
    } else {
      for (const err of report.parse_errors) {
        html += `<div class="issue-card">`;
        html += `<div class="pattern">Rule #${err.index}: ${esc(err.statement)}</div>`;
        html += `<div class="detail">${esc(err.error)}</div>`;
        html += `</div>`;
      }
    }
    html += `</div>`;

    // Shadowed rules
    html += `<div class="check-section"><h3>Shadowed Rules</h3>`;
    if (report.shadowed_rules.length === 0) {
      html += `<div class="empty-note">None — every rule is reachable</div>`;
    } else {
      for (const sh of report.shadowed_rules) {
        html += `<div class="issue-card">`;
        html += `<div class="pattern">${esc(sh.pattern)}</div>`;
        html += `<div class="detail">${esc(sh.shadowed_sutra)} (${esc(sh.shadowed_type)}) is shadowed by ${esc(sh.shadowed_by_sutra)} (${esc(sh.shadowed_by_type)})</div>`;
        html += `</div>`;
      }
    }
    html += `</div>`;

    // Ambiguous overlaps
    html += `<div class="check-section"><h3>Ambiguous Overlaps</h3>`;
    if (report.ambiguous_overlaps.length === 0) {
      html += `<div class="empty-note">None — no rules produce conflicting results at the same priority</div>`;
    } else {
      for (const ao of report.ambiguous_overlaps) {
        html += `<div class="issue-card">`;
        html += `<div class="pattern">${esc(ao.pattern)}</div>`;
        html += `<div class="detail">${esc(ao.rule_a_sutra)} → ${esc(ao.rule_a_result)} vs ${esc(ao.rule_b_sutra)} → ${esc(ao.rule_b_result)} (both ${esc(ao.rule_a_type)})</div>`;
        html += `</div>`;
      }
    }
    html += `</div>`;

    // Paradigm gaps
    const gaps = report.paradigm_gaps || [];
    if (gaps.length > 0) {
      html += `<div class="check-section"><h3>Paradigm Gaps</h3>`;
      for (const gap of gaps) {
        html += `<div class="issue-card">`;
        html += `<div class="pattern">${esc(gap.stem_class)} — ${gap.present}/${gap.expected} cells</div>`;
        html += `<div class="detail">Missing: ${gap.missing_cells.map(esc).join(", ")}</div>`;
        html += `</div>`;
      }
      html += `</div>`;
    }

    html += `</div>`;
  }

  container.innerHTML = html;
}

function renderStat(value, label) {
  return `<div class="coverage-stat"><span class="stat-value">${value}</span><span class="stat-label">${esc(label)}</span></div>`;
}
</script>
